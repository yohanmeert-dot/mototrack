<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MotoTrack Driver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body class="driver-body">
    <header class="driver-header">
        <div>
            <h1>MotoTrack Driver</h1>
            <p>{{ driver.nome }}</p>
        </div>

        <a href="/driver/logout">Sair</a>
    </header>

    <main class="driver-container">

        <section class="driver-card driver-main-status">
            <h2>Operação</h2>

            <div class="driver-actions">
                <button onclick="iniciarGPS()">📍 Iniciar GPS</button>
                <button class="btn-light" onclick="pararGPS()">Parar GPS</button>
            </div>

            <p id="gpsStatus">GPS parado.</p>
            <p class="small">Mantenha esta tela aberta durante as entregas.</p>
        </section>

        <section class="driver-card">
            <h2>Escanear pedido</h2>

            <button onclick="abrirScanner()">📷 Ler QR Code</button>
            <button class="btn-light" onclick="fecharScanner()">Fechar câmera</button>

            <div id="qr-reader"></div>

            <p id="scanStatus">Aguardando leitura...</p>
        </section>

        <section class="driver-card">
            <h2>Mapa da rota</h2>
            <div id="googleDriverMap"></div>
            <div id="routeSummary">Rota ainda não carregada.</div>
        </section>

        <section class="driver-card">
            <h2>Minha rota</h2>

            <button onclick="carregarRota()">Atualizar rota</button>

            <div id="driverRouteList" class="driver-route-list">
                Carregando rota...
            </div>
        </section>

    </main>

<script>
const driverId = {{ driver.id }};
const GOOGLE_MAPS_API_KEY = "{{ google_maps_api_key }}";

let watchId = null;
let currentLatLng = null;

let googleMap = null;
let driverMarker = null;
let directionsService = null;
let directionsRenderer = null;

let qrScanner = null;
let scannerRunning = false;

function initGoogleDriverMap() {
    const defaultCenter = { lat: -25.095, lng: -50.161 };

    googleMap = new google.maps.Map(document.getElementById("googleDriverMap"), {
        zoom: 14,
        center: defaultCenter,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
        map: googleMap,
        suppressMarkers: false
    });

    driverMarker = new google.maps.Marker({
        position: defaultCenter,
        map: googleMap,
        title: "Você",
        label: "M"
    });

    carregarRota();
}

function iniciarGPS() {
    if (!navigator.geolocation) {
        alert("GPS não disponível neste celular.");
        return;
    }

    document.getElementById("gpsStatus").innerText = "Solicitando permissão do GPS...";

    watchId = navigator.geolocation.watchPosition(
        enviarLocalizacao,
        erroGPS,
        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        }
    );
}

function pararGPS() {
    if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    document.getElementById("gpsStatus").innerText = "GPS parado.";
}

async function enviarLocalizacao(position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    currentLatLng = { lat: lat, lng: lng };

    document.getElementById("gpsStatus").innerText =
        "GPS ativo: " + lat.toFixed(5) + ", " + lng.toFixed(5);

    await fetch("/api/driver/location", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            driver_id: driverId,
            latitude: lat,
            longitude: lng
        })
    });

    if (driverMarker) {
    	driverMarker.setPosition(currentLatLng);
    } else {
        driverMarker = new google.maps.Marker({
            position: currentLatLng,
            map: googleMap,
            title: "Você",
            label: "M"
        });

        googleMap.setCenter(currentLatLng);
    }

    desenharRotaAtual();
}

function erroGPS(error) {
    document.getElementById("gpsStatus").innerText =
        "Erro no GPS: " + error.message;
}

async function carregarRota() {
    const response = await fetch("/api/driver/route/" + driverId);
    const data = await response.json();

    const container = document.getElementById("driverRouteList");

    if (!data.success || !data.route || data.route.length === 0) {
        container.innerHTML = "<p>Nenhum pedido em rota.</p>";
        document.getElementById("routeSummary").innerText = "Nenhum pedido em rota.";
        return;
    }

    window.currentRoute = data.route;

    let html = "";

    data.route.forEach(item => {
        html += `
            <div class="driver-order-card">
                <div class="driver-order-top">
                    <strong>${item.route_order}º - Pedido #${item.numero_pedido}</strong>
                    <span>${item.status}</span>
                </div>

                <p><strong>Cliente:</strong> ${item.cliente_nome || "-"}</p>
                <p><strong>Telefone:</strong> ${item.telefone || "-"}</p>
                <p><strong>Endereço:</strong><br>${(item.endereco || "-").replaceAll("\\n", "<br>")}</p>
                <p><strong>Taxa:</strong> R$ ${Number(item.taxa_entrega || 0).toFixed(2)}</p>
                <p><strong>Total:</strong> R$ ${Number(item.total || 0).toFixed(2)}</p>

                <div class="driver-items">
                    <strong>Itens para conferir:</strong>
                    ${renderItens(item.items)}
                </div>

                <button class="btn-done" onclick="finalizarEntrega(${item.delivery_id})">
                    ✅ Finalizar entrega
                </button>
            </div>
        `;
    });

    container.innerHTML = html;

    desenharRotaAtual();
}

function desenharRotaAtual() {
    if (!directionsService || !directionsRenderer) return;

    const route = window.currentRoute || [];

    if (!currentLatLng || route.length === 0) {
        return;
    }

    const waypoints = route.slice(0, -1).map(item => ({
        location: item.endereco,
        stopover: true
    }));

    const destination = route[route.length - 1].endereco;

    directionsService.route(
        {
            origin: currentLatLng,
            destination: destination,
            waypoints: waypoints,
            travelMode: google.maps.TravelMode.DRIVING,
            optimizeWaypoints: false
        },
        function(result, status) {
            if (status === "OK") {
                directionsRenderer.setDirections(result);

                let totalSeconds = 0;
                let totalMeters = 0;

                const legs = result.routes[0].legs;

                legs.forEach(leg => {
                    totalSeconds += leg.duration.value;
                    totalMeters += leg.distance.value;
                });

                const minutos = Math.round(totalSeconds / 60);
                const km = (totalMeters / 1000).toFixed(1);

                document.getElementById("routeSummary").innerText =
                    "Rota: " + km + " km | Tempo estimado: " + minutos + " min";
            } else {
                document.getElementById("routeSummary").innerText =
                    "Não foi possível calcular rota: " + status;
            }
        }
    );
}

function renderItens(items) {
    if (!items || items.length === 0) {
        return "<p>Nenhum item encontrado.</p>";
    }

    let html = "<ul>";

    items.forEach(item => {
        html += `<li><strong>${item.quantity}x ${item.name}</strong>`;

        if (item.customizations && item.customizations.length > 0) {
            html += "<br><small>" + item.customizations.join("<br>") + "</small>";
        }

        html += "</li>";
    });

    html += "</ul>";

    return html;
}

function extrairTokenDoQr(decodedText) {
    try {
        const url = new URL(decodedText);
        const partes = url.pathname.split("/");
        return partes[partes.length - 1];
    } catch (e) {
        return decodedText;
    }
}

function abrirScanner() {
    if (scannerRunning) return;

    qrScanner = new Html5Qrcode("qr-reader");

    qrScanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 240, height: 240 }
        },
        async function(decodedText) {
            const token = extrairTokenDoQr(decodedText);
            await despacharPedidoPorQr(token);
        },
        function(errorMessage) {}
    ).then(() => {
        scannerRunning = true;
        document.getElementById("scanStatus").innerText = "Câmera aberta. Aponte para o QR Code.";
    }).catch(err => {
        document.getElementById("scanStatus").innerText = "Erro ao abrir câmera: " + err;
    });
}

function fecharScanner() {
    if (qrScanner && scannerRunning) {
        qrScanner.stop().then(() => {
            scannerRunning = false;
            document.getElementById("scanStatus").innerText = "Câmera fechada.";
        });
    }
}

async function despacharPedidoPorQr(qrToken) {
    document.getElementById("scanStatus").innerText = "Despachando pedido...";

    const response = await fetch("/api/driver/scan", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            driver_id: driverId,
            qr_token: qrToken
        })
    });

    const data = await response.json();

    if (data.success) {
        document.getElementById("scanStatus").innerText =
            "Pedido #" + data.order.numero_pedido + " saiu para entrega.";

        fecharScanner();
        alert("Pedido despachado com sucesso!");

        await carregarRota();
    } else {
        document.getElementById("scanStatus").innerText = data.message || "Erro ao despachar.";
        alert(data.message || "Erro ao despachar pedido.");
    }
}

async function finalizarEntrega(deliveryId) {
    if (!confirm("Confirmar entrega finalizada?")) {
        return;
    }

    await fetch("/api/driver/finish", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            delivery_id: deliveryId,
            driver_id: driverId
        })
    });

    alert("Entrega finalizada!");
    carregarRota();
}
</script>

<script async defer
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initGoogleDriverMap">
</script>

</body>
</html>
