<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MotoTrack Driver</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="driver-body">
    <main class="driver-login-card">
        <h1>MotoTrack Driver</h1>
        <p>Área do motoboy</p>

        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="telefone" placeholder="Telefone cadastrado" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </main>
</body>
</html>
