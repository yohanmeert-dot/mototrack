<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cozinha - MotoTrack</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<header class="topbar">
    <div>
        <h1>Cozinha / Yampi</h1>
        <p>Painel vivo de produção</p>
    </div>
    <a class="logout" href="/admin">Voltar</a>
</header>

<main class="dashboard">

    <section class="hero kitchen-hero">
        <div>
            <h2>Pedidos em tempo real</h2>
            <p>Sincronização automática, impressão 58mm e controle de preparo.</p>
        </div>

        <div class="hero-actions">
            <button onclick="syncYampiOrders(event)">Sincronizar agora</button>
            <button onclick="toggleSound()" id="soundButton">🔔 Som ativado</button>
        </div>
    </section>

    <section class="status-row">
        <div class="status-card">
            <span>Última atualização</span>
            <strong id="lastUpdate">---</strong>
        </div>

        <div class="status-card">
            <span>Status</span>
            <strong id="syncStatus">Aguardando sincronização...</strong>
        </div>
    </section>

    <section>
        <div id="ordersContainer">
            <div class="empty-state">Carregando pedidos...</div>
        </div>
    </section>

</main>

<script src="/static/cozinha.js"></script>

</body>
</html>
