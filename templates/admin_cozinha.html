<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cozinha - MotoTrack</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<header>
    <h1>Cozinha / Pedidos Yampi</h1>
    <a href="/admin">Voltar</a>
</header>

<main>
    <section class="card">
        <h2>Painel vivo</h2>

        <button onclick="syncYampiOrders(event)">
            Sincronizar agora
        </button>

        <button onclick="toggleSound()" id="soundButton">
            Som: ativado
        </button>

        <p>
            Última atualização:
            <strong id="lastUpdate">---</strong>
        </p>

        <p id="syncStatus">Aguardando sincronização...</p>
    </section>

    <section class="card">
        <h2>Pedidos da cozinha</h2>

        <div id="ordersContainer">
            <p>Carregando pedidos...</p>
        </div>
    </section>
</main>

<script src="/static/cozinha.js"></script>

</body>
</html>
